// Inbox item entity definition with entitystore annotations.
//
// Design principle: the proto defines content and state — the minimum
// structured data needed to display and mutate an item. Everything else
// (type, priority, team, assignee, source) lives in entity store tags
// so items can be routed, filtered, and classified without schema changes.
//
// Payloads and event data are typed proto messages. Each carries a
// payload_type / data_type field with the fully qualified proto message
// name (e.g. "type.googleapis.com/forms.v1.ActionForm"). This allows:
//   - Queryable type discrimination without parsing the payload blob
//   - Type-safe deserialization via the proto registry
//   - Schema versioning via proto's backwards-compatible evolution
//   - Analytics aggregation by type across the entire inbox
//
// Tag conventions (key:value strings):
//
//   type:<subtype>        — item kind, e.g. "type:approval", "type:review", "type:conflict"
//   priority:<level>      — "priority:urgent", "priority:high", "priority:normal", "priority:low"
//   team:<name>           — owning team, e.g. "team:finance", "team:engineering"
//   assignee:<actor>      — assigned human or agent, e.g. "assignee:pascal", "assignee:agent:triage-bot"
//   source:<urn>          — creator, e.g. "source:workflow:inv-123", "source:classifier:v2"
//   workflow:<id>         — parent workflow, e.g. "workflow:invoice-approval-456"
//   callback:<address>    — response delivery, e.g. "callback:https://...", "callback:dbos:wf-id:topic"
//   status:<state>        — mirrored from the status field for tag-based queries
//   deadline:<RFC3339>    — mirrored from deadline field for background job queries
//
// This means adding a new priority level, team, or item type is just
// a new tag value — zero proto changes, zero migrations.
syntax = "proto3";
package inbox.v1;

option go_package = "github.com/laenen-partners/inbox/gen/inbox/v1;inboxv1";

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";
import "entitystore/v1/options.proto";

// Item is the core inbox entity. It represents a unit of work to be
// resolved by a human or AI agent.
//
// Linking to other items, workflows, or external entities is done
// entirely via tags (e.g. "workflow:inv-456", "ref:invoice:789",
// "blocks:item:abc"). This avoids the need for entity store relations
// in v1 and keeps the model simple. Relations can be introduced later
// if graph traversal becomes a real requirement.
message Item {
  option (entitystore.v1.message) = {
    extraction_display_name: "Inbox Item"
  };

  // Optional idempotency key. When set, acts as an entity store anchor
  // to prevent duplicate item creation. Callers should set this to a
  // stable identifier derived from the source context, e.g.:
  //   "workflow:onboarding-456:pep_screening"
  //   "classifier:batch-789:invoice:INV-1234"
  //
  // If empty, no deduplication is enforced — each Create produces a
  // new item. This is the default for most use cases.
  string idempotency_key = 1 [(entitystore.v1.field) = {
    anchor: true
    similarity: SIMILARITY_FUNCTION_EXACT
    weight: 0.0
    extract: false
  }];

  // Human-readable summary of what needs to be done.
  string title = 2 [(entitystore.v1.field) = {
    embed: true
    token_field: true
  }];

  // Detailed context, instructions, or background for the resolver.
  string description = 3 [(entitystore.v1.field) = {
    embed: true
    token_field: true
  }];

  // Lifecycle status: open, claimed, completed, expired, cancelled.
  // Also mirrored as a "status:<value>" tag for filtering.
  string status = 4;

  // Optional expiry. After this time, a background process may
  // transition the item to "expired". Also mirrored as a
  // "deadline:<RFC3339>" tag.
  google.protobuf.Timestamp deadline = 5;

  // Fully qualified proto message name of the payload.
  // Stored as a top-level field for queryability — consumers can
  // filter by payload type without deserializing the payload.
  // Example: "type.googleapis.com/forms.v1.ActionForm"
  string payload_type = 6;

  // Typed payload as a proto Any. The inbox stores and delivers it
  // without interpretation. Payload proto definitions are owned by
  // the packages that create and render items.
  google.protobuf.Any payload = 7;

  // Append-only activity log. Every state change, comment, or
  // action is recorded here, giving each item a lightweight
  // thread of context.
  repeated Event events = 8;
}

// Event records a single thing that happened on an inbox item.
// Events are append-only — never modified or deleted.
message Event {
  // When this event occurred.
  google.protobuf.Timestamp at = 1;

  // Who or what triggered this event.
  // Convention: "user:<id>", "agent:<name>", "workflow:<id>", "system".
  string actor = 2;

  // What happened. Well-known actions:
  //   created, claimed, released, commented, tagged,
  //   responded, escalated, expired, cancelled, reassigned.
  string action = 3;

  // Human-readable detail or comment body. Optional.
  string detail = 4;

  // Fully qualified proto message name of the event data.
  // Example: "type.googleapis.com/inbox.v1.ResponseEvent"
  string data_type = 5;

  // Structured event-specific data as a proto Any. Optional.
  google.protobuf.Any data = 6;
}
