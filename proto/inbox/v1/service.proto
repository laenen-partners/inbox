syntax = "proto3";
package inbox.v1;

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";
import "inbox/v1/item.proto";

option go_package = "github.com/laenen-partners/inbox/gen/inbox/v1;inboxv1";

// Identity is carried on every request.
message Identity {
  string tenant_id = 1;
  string workspace_id = 2;
  string principal_id = 3;
  string principal_type = 4;
  repeated string roles = 5;
}

// InboxItem wraps the stored Item with entity metadata.
message InboxItem {
  string id = 1;
  Item data = 2;
  repeated string tags = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

// ─── Requests & Responses ───

message CreateItemRequest {
  Identity identity = 1;
  string title = 2;
  string description = 3;
  google.protobuf.Timestamp deadline = 4;
  string payload_type = 5;
  google.protobuf.Any payload = 6;
  repeated string tags = 7;
  string idempotency_key = 8;
}
message CreateItemResponse {
  InboxItem item = 1;
}

message GetItemRequest {
  Identity identity = 1;
  string id = 2;
}
message GetItemResponse {
  InboxItem item = 1;
}

message ListItemsRequest {
  Identity identity = 1;
  repeated string tags = 2;
  int32 page_size = 3;
  google.protobuf.Timestamp cursor = 4;
}
message ListItemsResponse {
  repeated InboxItem items = 1;
  google.protobuf.Timestamp next_cursor = 2;
}

message SearchItemsRequest {
  Identity identity = 1;
  string query = 2;
  int32 page_size = 3;
}
message SearchItemsResponse {
  repeated InboxItem items = 1;
}

message ClaimItemRequest {
  Identity identity = 1;
  string id = 2;
}
message ClaimItemResponse {
  InboxItem item = 1;
}

message ReleaseItemRequest {
  Identity identity = 1;
  string id = 2;
}
message ReleaseItemResponse {
  InboxItem item = 1;
}

message ReassignItemRequest {
  Identity identity = 1;
  string id = 2;
  string from_actor = 3;
  string to_actor = 4;
  string reason = 5;
}
message ReassignItemResponse {
  InboxItem item = 1;
}

message CommentOnItemRequest {
  Identity identity = 1;
  string id = 2;
  string body = 3;
  repeated string visibility = 4;
  repeated string refs = 5;
}
message CommentOnItemResponse {
  InboxItem item = 1;
}

message AddEventRequest {
  Identity identity = 1;
  string id = 2;
  string detail = 3;
  string data_type = 4;
  google.protobuf.Any data = 5;
}
message AddEventResponse {
  InboxItem item = 1;
}

message CloseItemRequest {
  Identity identity = 1;
  string id = 2;
  string reason = 3;
}
message CloseItemResponse {
  InboxItem item = 1;
}

message TagItemRequest {
  Identity identity = 1;
  string id = 2;
  repeated string tags = 3;
}

message TagItemResponse {}

message UntagItemRequest {
  Identity identity = 1;
  string id = 2;
  string tag = 3;
}

message UntagItemResponse {}

// ─── Service ───

service InboxService {
  rpc CreateItem(CreateItemRequest) returns (CreateItemResponse);
  rpc GetItem(GetItemRequest) returns (GetItemResponse);
  rpc ListItems(ListItemsRequest) returns (ListItemsResponse);
  rpc SearchItems(SearchItemsRequest) returns (SearchItemsResponse);
  rpc ClaimItem(ClaimItemRequest) returns (ClaimItemResponse);
  rpc ReleaseItem(ReleaseItemRequest) returns (ReleaseItemResponse);
  rpc ReassignItem(ReassignItemRequest) returns (ReassignItemResponse);
  rpc CommentOnItem(CommentOnItemRequest) returns (CommentOnItemResponse);
  rpc AddEvent(AddEventRequest) returns (AddEventResponse);
  rpc CloseItem(CloseItemRequest) returns (CloseItemResponse);
  rpc TagItem(TagItemRequest) returns (TagItemResponse);
  rpc UntagItem(UntagItemRequest) returns (UntagItemResponse);
}
