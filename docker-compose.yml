services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: inbox
      POSTGRES_USER: inbox
      POSTGRES_PASSWORD: inbox
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inbox"]
      interval: 2s
      timeout: 5s
      retries: 10

  inboxui:
    build: .
    command: ["-seed"]
    environment:
      DATABASE_URL: postgres://inbox:inbox@postgres:5432/inbox?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
