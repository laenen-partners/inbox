services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: inbox
      POSTGRES_USER: inbox
      POSTGRES_PASSWORD: inbox
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inbox"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
