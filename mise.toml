[tools]
go = "1.25"
buf = "latest"

[tasks.generate]
description = "Generate Go code from proto definitions"
run = "buf generate"

[tasks.build]
description = "Build all packages"
run = "go build ./..."
depends = ["generate"]

[tasks.test]
description = "Run all tests"
run = "go test -v -count=1 -timeout 120s ./..."
depends = ["build"]

[tasks.lint]
description = "Run go vet"
run = "go vet ./..."
depends = ["build"]

[tasks.tidy]
description = "Tidy go modules"
run = "go mod tidy"

[tasks.clean]
description = "Remove generated code"
run = "rm -rf gen/"
