version: v2
plugins:
  - local: protoc-gen-go
    out: gen
    opt: paths=source_relative
  - local: protoc-gen-connect-go
    out: gen
    opt: paths=source_relative
  - local:
      [
        "go",
        "run",
        "github.com/laenen-partners/entitystore/cmd/protoc-gen-entitystore@latest",
      ]
    out: gen
    opt: paths=source_relative
